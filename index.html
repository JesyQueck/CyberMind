<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CyberMind</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0e13;
  --bg2:      #111820;
  --bg3:      #1a2535;
  --card:     #141c27;
  --border:   #1e2d42;
  --border2:  #2a3f5a;
  --green:    #22d98a;
  --green2:   #16a865;
  --green-bg: #0d2a1f;
  --blue:     #3b9eff;
  --blue-bg:  #0d1f35;
  --red:      #ff5370;
  --red-bg:   #2a1018;
  --yellow:   #ffc947;
  --yellow-bg:#2a2010;
  --purple:   #b57aff;
  --text:     #e8f0fe;
  --text2:    #8fa8c8;
  --text3:    #4d6480;
  --white:    #ffffff;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --r8: 8px; --r12: 12px; --r16: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── SETUP SCREEN ── */
.setup-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
.setup-screen.hidden { display: none; }

.setup-logo {
  font-family: var(--mono);
  font-size: 30px; font-weight: 700;
  color: var(--green);
  letter-spacing: 4px;
  margin-bottom: 4px;
  text-shadow: 0 0 24px rgba(34,217,138,.4);
}
.setup-sub {
  font-family: var(--mono);
  font-size: 11px; color: var(--text3);
  letter-spacing: 3px; margin-bottom: 32px;
}
.setup-box {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 28px 24px;
  width: 100%; max-width: 420px;
}
.setup-box h2 {
  font-size: 18px; font-weight: 700;
  color: var(--white); margin-bottom: 12px;
}
.setup-box p {
  font-size: 14px; color: var(--text2);
  line-height: 1.7; margin-bottom: 20px;
}
.setup-box p a { color: var(--blue); text-decoration: none; }
.setup-box p strong { color: var(--text); }
.setup-note {
  background: var(--bg3);
  border-radius: var(--r8);
  padding: 12px 14px;
  font-size: 13px; color: var(--text2);
  line-height: 1.6; margin-bottom: 18px;
}
.api-input {
  background: var(--bg);
  border: 2px solid var(--border2);
  border-radius: var(--r12);
  color: var(--green);
  font-family: var(--mono);
  font-size: 13px;
  padding: 14px 16px;
  width: 100%; outline: none;
  transition: border-color .2s;
  margin-bottom: 14px;
  letter-spacing: .5px;
}
.api-input:focus { border-color: var(--green); }
.api-input::placeholder { color: var(--text3); letter-spacing: 0; }

.btn-primary {
  width: 100%;
  background: var(--green);
  border: none; border-radius: var(--r12);
  color: #041a10;
  font-family: var(--sans);
  font-size: 15px; font-weight: 700;
  padding: 16px; cursor: pointer;
  transition: all .2s; margin-bottom: 10px;
}
.btn-primary:hover { background: #1fc97d; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--r12);
  color: var(--text2);
  font-size: 14px; padding: 14px;
  cursor: pointer; transition: all .2s;
}
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }

/* ── KEY BAR ── */
.key-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.key-dot {
  width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}
.key-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.key-dot.off { background: var(--red); }
.key-text { flex: 1; color: var(--text2); }
.key-change {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); font-size: 11px;
  padding: 5px 10px; border-radius: 6px; cursor: pointer;
  transition: all .2s;
}
.key-change:hover { border-color: var(--green); color: var(--green); }

/* ── HEADER ── */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px 14px;
  position: sticky; top: 0; z-index: 100;
}
.header-row {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 6px;
}
.logo {
  font-family: var(--mono);
  font-size: 20px; font-weight: 700;
  color: var(--green); letter-spacing: 3px;
}
.logo em { color: var(--text3); font-style: normal; }
.online-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--green-bg);
  border: 1px solid rgba(34,217,138,.25);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; color: var(--green);
  font-family: var(--mono);
}
.pulse { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
.date-line { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.date-line span { color: var(--text2); }

/* ── TOP NAV ── */
.nav {
  display: flex; gap: 6px;
  padding: 10px 14px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.nav-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.nav-btn.active {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green); font-weight: 600;
}

/* ── SECTIONS ── */
.section { display: none; padding: 18px 16px; animation: fadeIn .25s ease; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.app { max-width: 480px; margin: 0 auto; padding-bottom: 90px; }

/* ── SECTION LABEL ── */
.sec-label {
  font-family: var(--mono);
  font-size: 10px; font-weight: 500;
  color: var(--text3); letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px; margin-top: 22px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label:first-child { margin-top: 0; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── MISSION CARD ── */
.mission-card {
  background: linear-gradient(135deg, #0f2a1e 0%, #0a1f30 100%);
  border: 1px solid rgba(34,217,138,.3);
  border-radius: 18px;
  padding: 22px 20px;
  margin-bottom: 22px;
  position: relative; overflow: hidden;
}
.mission-card::after {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(34,217,138,.08) 0%, transparent 70%);
  pointer-events: none;
}
.mission-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(34,217,138,.12);
  border: 1px solid rgba(34,217,138,.25);
  border-radius: 20px; padding: 4px 12px;
  font-family: var(--mono); font-size: 10px;
  color: var(--green); letter-spacing: 1px;
  margin-bottom: 12px;
}
.mission-title {
  font-size: 20px; font-weight: 800;
  color: var(--white); margin-bottom: 8px;
  line-height: 1.3;
}
.mission-desc {
  font-size: 14px; color: var(--text2);
  line-height: 1.6;
}
.stats-row {
  display: flex; gap: 10px; margin-top: 18px;
}
.stat-box {
  flex: 1; background: rgba(0,0,0,.3);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 10px;
  text-align: center;
}
.stat-num {
  font-family: var(--mono);
  font-size: 24px; font-weight: 700;
  color: var(--green); display: block;
  line-height: 1;
}
.stat-label {
  font-size: 11px; color: var(--text3);
  margin-top: 4px; display: block;
  font-weight: 500;
}

/* ── PATH CARDS ── */
.path-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 22px;
}
.path-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px; padding: 16px 14px;
  cursor: pointer; transition: all .2s;
}
.path-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.path-card.selected {
  border-color: var(--green);
  background: var(--green-bg);
}
.path-icon { font-size: 26px; margin-bottom: 10px; }
.path-name {
  font-size: 13px; font-weight: 700;
  color: var(--white); margin-bottom: 4px;
}
.path-tag {
  font-size: 11px; color: var(--text3);
  line-height: 1.4;
}
.path-card.selected .path-tag { color: var(--text2); }
.path-card.selected .path-name { color: var(--green); }

/* ── HABIT ITEMS ── */
.habit-list { display: flex; flex-direction: column; gap: 4px; }
.habit-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px; cursor: pointer;
  transition: all .2s;
}
.habit-item:hover { border-color: var(--border2); background: var(--bg3); }
.habit-item.done { opacity: .55; }
.hcheck {
  width: 24px; height: 24px;
  border: 2px solid var(--border2);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
  transition: all .2s;
}
.hcheck.done { background: var(--green); border-color: var(--green); color: #041a10; }
.htext { flex: 1; font-size: 14px; color: var(--text); font-weight: 500; }
.htext.done { text-decoration: line-through; color: var(--text3); }
.xp-pill {
  background: var(--yellow-bg);
  border: 1px solid rgba(255,201,71,.25);
  color: var(--yellow);
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
}

/* ── GENERIC CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 18px;
  margin-bottom: 12px;
}
.card.accent-green { border-color: rgba(34,217,138,.3); background: linear-gradient(135deg, var(--green-bg), var(--card)); }
.card.accent-blue  { border-color: rgba(59,158,255,.3); background: linear-gradient(135deg, var(--blue-bg), var(--card)); }

.card-label {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 2px; font-weight: 500;
  margin-bottom: 8px; text-transform: uppercase;
}
.label-green { color: var(--green); }
.label-blue  { color: var(--blue); }
.label-red   { color: var(--red); }
.label-yellow{ color: var(--yellow); }
.card-title { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 6px; line-height: 1.4; }
.card-body  { font-size: 14px; color: var(--text2); line-height: 1.7; }
.card-body strong { color: var(--text); font-weight: 600; }

/* ── RESOURCE CARDS ── */
.res-card {
  display: flex; align-items: flex-start; gap: 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  margin-bottom: 8px; text-decoration: none; color: inherit;
  transition: all .2s; cursor: pointer;
}
.res-card:hover { border-color: var(--border2); background: var(--bg3); transform: translateX(3px); }
.res-icon {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.ri-video  { background: rgba(255,83,112,.15); }
.ri-lab    { background: rgba(59,158,255,.15); }
.ri-cert   { background: rgba(181,122,255,.15); }
.ri-news   { background: rgba(34,217,138,.15); }
.res-info { flex: 1; min-width: 0; }
.res-type { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; font-weight: 500; margin-bottom: 3px; }
.rt-video  { color: var(--red); }
.rt-lab    { color: var(--blue); }
.rt-cert   { color: var(--purple); }
.rt-news   { color: var(--green); }
.res-name  { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
.res-desc  { font-size: 13px; color: var(--text2); line-height: 1.4; }
.free-tag  {
  display: inline-block; margin-top: 6px;
  background: var(--green-bg); border: 1px solid rgba(34,217,138,.25);
  color: var(--green); font-family: var(--mono);
  font-size: 10px; padding: 2px 8px; border-radius: 5px;
}

/* ── MINDSET ── */
.principle {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; margin-bottom: 8px;
}
.principle-num {
  font-family: var(--mono); font-size: 10px;
  color: var(--green); letter-spacing: 2px;
  font-weight: 500; margin-bottom: 7px;
}
.principle-title { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
.principle-body  { font-size: 14px; color: var(--text2); line-height: 1.7; }

.tip-box {
  background: linear-gradient(135deg, var(--blue-bg), var(--card));
  border: 1px solid rgba(59,158,255,.3);
  border-radius: 16px; padding: 18px; margin-bottom: 20px;
}
.tip-label { font-family: var(--mono); font-size: 10px; color: var(--blue); letter-spacing: 2px; margin-bottom: 8px; }
.tip-text  { font-size: 15px; color: var(--text); line-height: 1.7; font-weight: 500; }

.scenario-box {
  background: linear-gradient(135deg, #1a1a2e, var(--card));
  border: 1px solid rgba(181,122,255,.3);
  border-radius: 16px; padding: 18px;
}
.scenario-label { font-family: var(--mono); font-size: 10px; color: var(--purple); letter-spacing: 2px; margin-bottom: 10px; }
.scenario-text  { font-size: 14px; color: var(--text); line-height: 1.8; }

/* ── QUIZ ── */
.score-row { display: flex; gap: 10px; margin-bottom: 18px; }
.score-box {
  flex: 1; background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
  text-align: center;
}
.score-num { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--green); display: block; }
.score-lbl { font-size: 11px; color: var(--text3); font-weight: 500; margin-top: 3px; display: block; }

.quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
.quiz-q    { font-size: 16px; font-weight: 600; color: var(--white); line-height: 1.6; margin-bottom: 18px; }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt  {
  background: var(--bg3); border: 2px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-size: 14px; font-weight: 500;
  padding: 14px 16px; text-align: left;
  cursor: pointer; transition: all .2s; line-height: 1.4;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-bg); color: var(--white); }
.quiz-opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.quiz-opt.wrong   { border-color: var(--red);   background: var(--red-bg);   color: var(--red); }
.quiz-opt:disabled { cursor: default; }
.quiz-exp {
  margin-top: 16px; padding: 16px;
  background: var(--blue-bg);
  border: 1px solid rgba(59,158,255,.25);
  border-radius: 12px;
  font-size: 14px; color: var(--text); line-height: 1.7;
  display: none;
}
.quiz-exp.show { display: block; }
.quiz-exp-label { font-family: var(--mono); font-size: 10px; color: var(--blue); letter-spacing: 2px; margin-bottom: 8px; }

/* ── JOURNAL ── */
.j-textarea {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text); font-family: var(--sans);
  font-size: 15px; line-height: 1.7;
  padding: 16px; width: 100%;
  min-height: 120px; resize: none; outline: none;
  transition: border-color .2s; margin-bottom: 12px;
}
.j-textarea:focus { border-color: var(--green); }
.j-textarea::placeholder { color: var(--text3); }
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.tag-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-size: 13px; font-weight: 500;
  padding: 7px 14px; border-radius: 20px; cursor: pointer;
  transition: all .2s;
}
.tag-btn.sel-learning { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.tag-btn.sel-win      { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.tag-btn.sel-question { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
.tag-btn.sel-incident { background: var(--red-bg); border-color: var(--red); color: var(--red); }

.j-entry {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 8px;
  position: relative;
}
.j-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 8px; }
.j-body { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
.j-tag  {
  display: inline-block; margin-top: 10px;
  font-size: 12px; font-weight: 600;
  padding: 3px 10px; border-radius: 6px;
}
.jt-learning { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,158,255,.25); }
.jt-win      { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,217,138,.25); }
.jt-question { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(255,201,71,.25); }
.jt-incident { background: var(--red-bg); color: var(--red); border: 1px solid rgba(255,83,112,.25); }
.j-del {
  position: absolute; top: 12px; right: 14px;
  background: transparent; border: none;
  color: var(--text3); font-size: 16px; cursor: pointer;
  padding: 2px 4px; line-height: 1;
}
.j-del:hover { color: var(--red); }

/* ── REMINDERS ── */
.rem-item {
  display: flex; align-items: flex-start; gap: 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px;
  margin-bottom: 8px; cursor: pointer; transition: all .2s;
}
.rem-item:hover { border-color: var(--border2); }
.rem-item.done  { opacity: .5; }
.rem-check {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-top: 1px;
  transition: all .2s;
}
.rem-check.done { background: var(--green); border-color: var(--green); color: #041a10; }
.rem-title { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
.rem-time  { font-family: var(--mono); font-size: 12px; color: var(--green); margin-bottom: 4px; font-weight: 500; }
.rem-desc  { font-size: 13px; color: var(--text2); line-height: 1.5; }

/* ── ALARM BUILDER ── */
.time-input {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 12px; color: var(--green);
  font-family: var(--mono); font-size: 32px;
  font-weight: 700;
  padding: 14px; width: 100%;
  text-align: center; outline: none;
  transition: border-color .2s; margin-bottom: 12px;
}
.time-input:focus { border-color: var(--green); }
.lbl-input {
  background: var(--bg); border: 2px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-size: 15px; padding: 14px 16px;
  width: 100%; outline: none;
  transition: border-color .2s; margin-bottom: 12px;
}
.lbl-input:focus { border-color: var(--green); }
.lbl-input::placeholder { color: var(--text3); }
.days-row { display: flex; gap: 6px; margin-bottom: 14px; }
.day-btn {
  flex: 1; background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2); padding: 10px 0;
  border-radius: 8px; font-family: var(--mono);
  font-size: 11px; font-weight: 500; cursor: pointer;
  transition: all .2s;
}
.day-btn.on { background: var(--green-bg); border-color: var(--green); color: var(--green); }

.alarm-item {
